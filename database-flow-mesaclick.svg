<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f2e9"/>
      <stop offset="100%" stop-color="#f0e4d2"/>
    </linearGradient>
    <linearGradient id="boxSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf3"/>
      <stop offset="100%" stop-color="#f6ecdf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#5b4634" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#8c5a3c"/>
    </marker>
    <style>
      .title { font: 700 44px Georgia, serif; fill: #231913; }
      .subtitle { font: 400 22px Georgia, serif; fill: #6b5c52; }
      .boxTitle { font: 700 30px Georgia, serif; fill: #231913; }
      .boxText { font: 400 21px Georgia, serif; fill: #4f433b; }
      .note { font: 400 20px Georgia, serif; fill: #5a4b40; }
      .label { font: 600 20px Georgia, serif; fill: #8c5a3c; }
      .small { font: 400 18px Georgia, serif; fill: #6b5c52; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="url(#bg)"/>

  <rect x="60" y="60" width="1480" height="120" rx="28" fill="#fffaf3" stroke="#d9c7b3" stroke-width="2" filter="url(#shadow)"/>
  <text x="92" y="110" class="title">Flujo de Base de Datos MesaClick</text>
  <text x="92" y="150" class="subtitle">Relaciones principales entre usuarios, reservas, reviews y menu</text>

  <rect x="60" y="220" width="1480" height="680" rx="28" fill="#fffaf3" stroke="#d9c7b3" stroke-width="2" filter="url(#shadow)"/>

  <!-- Boxes -->
  <g filter="url(#shadow)">
    <rect x="130" y="300" width="340" height="180" rx="24" fill="url(#boxSoft)" stroke="#c8a26a" stroke-width="3"/>
    <rect x="585" y="280" width="430" height="230" rx="24" fill="url(#boxSoft)" stroke="#8c5a3c" stroke-width="3"/>
    <rect x="1090" y="300" width="340" height="180" rx="24" fill="url(#boxSoft)" stroke="#c8a26a" stroke-width="3"/>
    <rect x="420" y="610" width="760" height="180" rx="24" fill="#f8f3ea" stroke="#6f8468" stroke-width="3"/>
  </g>

  <!-- User -->
  <text x="154" y="335" class="boxTitle">User</text>
  <text x="154" y="380" class="boxText">name</text>
  <text x="154" y="412" class="boxText">email</text>
  <text x="154" y="444" class="boxText">password</text>
  <text x="154" y="476" class="boxText">role: user | admin</text>

  <!-- Reservation -->
  <text x="609" y="315" class="boxTitle">Reservation</text>
  <text x="609" y="360" class="boxText">user -&gt; ObjectId(User)</text>
  <text x="609" y="392" class="boxText">date, time, people</text>
  <text x="609" y="424" class="boxText">area: indoor | terrace</text>
  <text x="609" y="456" class="boxText">status: pending | confirmed | cancelled</text>

  <!-- Review -->
  <text x="1114" y="335" class="boxTitle">Review</text>
  <text x="1114" y="380" class="boxText">user -&gt; ObjectId(User)</text>
  <text x="1114" y="412" class="boxText">rating: 1 a 5</text>
  <text x="1114" y="444" class="boxText">comment</text>

  <!-- MenuItem -->
  <text x="444" y="645" class="boxTitle">MenuItem</text>
  <text x="444" y="690" class="boxText">name, description, price</text>
  <text x="444" y="722" class="boxText">category, image, available</text>
  <text x="444" y="754" class="boxText">Sin relacion directa con User</text>

  <!-- Arrows -->
  <line x1="470" y1="390" x2="585" y2="390" stroke="#8c5a3c" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="500" y="352" class="label">1 a N</text>

  <line x1="470" y1="390" x2="1090" y2="390" stroke="#8c5a3c" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="760" y="352" class="label">1 a N</text>

  <line x1="800" y1="510" x2="800" y2="610" stroke="#6f8468" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="840" y="565" class="label">consulta</text>

  <!-- Footer note -->
  <rect x="130" y="840" width="1340" height="90" rx="20" fill="#ffffff" stroke="#ddcdb8" stroke-width="2"/>
  <text x="160" y="875" class="note">MongoDB + Mongoose: User referencia Reservation y Review mediante ObjectId. MenuItem se gestiona aparte.</text>
  <text x="160" y="905" class="small">Flujo pensado para MesaClick: autenticación, reservas, opiniones y carta del restaurante.</text>
</svg>
